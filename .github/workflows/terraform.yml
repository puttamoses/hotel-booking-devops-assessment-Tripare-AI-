name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra

  plan:
    needs: fmt
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'AKIAIOSFODNN7EXAMPLE' }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY' }}
      AWS_DEFAULT_REGION: ap-south-1
      TF_VAR_db_password: ci-plan-only-placeholder
      TF_VAR_skip_aws_account_lookup: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -refresh=false > plan.txt
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: ${{ matrix.env }}
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync(
              '${{ github.workspace }}/infra/envs/${{ matrix.env }}/plan.txt',
              'utf8'
            );

            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + "\n...(truncated)";
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan (${process.env.ENVIRONMENT})\n\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
